
<canvas id="cv" style="display:block;width:100%;height:500px;border-radius:12px;background:#0a1a0f"></canvas>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H, raf, t = 0;

const G = '#00994D', GL = '#00C060', GD = '#007A3D', GM = '#E6F5ED';
const BG = '#0a1a0f', BGMID = '#0f2318';

function resize() {
  const r = cv.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio;
  cv.height = r.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  W = r.width; H = r.height;
}
resize();
window.addEventListener('resize', resize);

function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function ease(t){ return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

// ── Floors definition ──
const FLOORS = [
  { label:'Raw Data',       sublabel:'Siloed sources',       color:'#1a3a22', accent:'#2d6644', icon:'db',    level:0 },
  { label:'DWH Layer',      sublabel:'Unified warehouse',    color:'#1a3a2a', accent:'#3a7a50', icon:'stack', level:1 },
  { label:'Analytics',      sublabel:'Self-service BI',      color:'#183d28', accent:G,         icon:'chart', level:2 },
  { label:'Decisions',      sublabel:'Decision sciences',    color:'#164030', accent:GL,        icon:'brain', level:3 },
  { label:'AI & Insight',   sublabel:'Intelligent automation',color:'#124438', accent:GL,       icon:'spark', level:4 },
];

const FLOOR_COUNT = FLOORS.length;

// Particles flowing through pipes
let particles = [];

class Pipe {
  constructor(x, floorY, floorH) {
    this.x = x;
    this.floorY = floorY;
    this.floorH = floorH;
  }
}

class DataPacket {
  constructor(x, startY) {
    this.x = x + (Math.random()-0.5)*6;
    this.y = startY;
    this.speed = 0.4 + Math.random()*0.8;
    this.size = 2 + Math.random()*2.5;
    this.alpha = 0.6 + Math.random()*0.4;
    this.color = Math.random() > 0.3 ? G : (Math.random()>.5 ? GL : '#ffffff');
    this.trail = [];
  }
  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 10) this.trail.shift();
    this.y -= this.speed;
  }
  draw() {
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i=1;i<this.trail.length;i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
      ctx.strokeStyle = this.color;
      ctx.lineWidth = this.size * 0.5;
      ctx.globalAlpha = this.alpha * 0.25;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// Horizontal scanning lines per floor (simulating data activity)
class ScanLine {
  constructor(floorY, floorH, color) {
    this.y = floorY + Math.random() * floorH;
    this.floorY = floorY;
    this.floorH = floorH;
    this.alpha = 0.15 + Math.random()*0.25;
    this.speed = 0.3 + Math.random()*0.5;
    this.color = color;
  }
  update() {
    this.y -= this.speed;
    if (this.y < this.floorY) this.y = this.floorY + this.floorH;
  }
  draw(x, w) {
    ctx.beginPath();
    ctx.moveTo(x, this.y);
    ctx.lineTo(x + w, this.y);
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = this.alpha;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

let scanLines = [];
let startTime = null;

function drawIcon(type, cx, cy, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (type === 'db') {
    ctx.beginPath(); ctx.ellipse(cx, cy-r*0.4, r*0.7, r*0.25, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-r*0.7, cy-r*0.4); ctx.lineTo(cx-r*0.7, cy+r*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+r*0.7, cy-r*0.4); ctx.lineTo(cx+r*0.7, cy+r*0.4); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx, cy+r*0.4, r*0.7, r*0.25, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx, cy, r*0.7, r*0.25, 0, 0, Math.PI*2); ctx.stroke();
  } else if (type === 'stack') {
    for (let i=0;i<3;i++) {
      const yy = cy - r*0.5 + i*r*0.5;
      ctx.beginPath();
      ctx.roundRect(cx-r*0.7, yy-r*0.18, r*1.4, r*0.3, 2);
      ctx.stroke();
    }
  } else if (type === 'chart') {
    const bars = [0.4,0.75,0.55,1.0,0.65];
    bars.forEach((h,i) => {
      const bx = cx - r*0.8 + i*(r*1.6/bars.length);
      const bh = h * r * 0.8;
      ctx.fillRect(bx, cy+r*0.4-bh, r*0.22, bh);
    });
  } else if (type === 'brain') {
    ctx.beginPath();
    ctx.arc(cx-r*0.2, cy, r*0.55, Math.PI*0.1, Math.PI*1.9); ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx+r*0.2, cy, r*0.55, Math.PI*1.1, Math.PI*2.9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy-r*0.55); ctx.lineTo(cx, cy+r*0.55); ctx.stroke();
  } else if (type === 'spark') {
    // lightning bolt
    ctx.beginPath();
    ctx.moveTo(cx+r*0.2, cy-r*0.9);
    ctx.lineTo(cx-r*0.3, cy-r*0.0);
    ctx.lineTo(cx+r*0.15, cy+r*0.05);
    ctx.lineTo(cx-r*0.2, cy+r*0.9);
    ctx.stroke();
  }
  ctx.restore();
}

function drawKpiTag(x, y, label, value, color) {
  const pad = 8;
  const w = 86, h = 30;
  ctx.save();
  ctx.globalAlpha = 0.92;
  ctx.fillStyle = '#0a1a0f';
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 4);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = '500 9px DM Sans,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(label, x+pad, y+11);
  ctx.fillStyle = '#c8f0dc';
  ctx.font = '600 12px DM Sans,sans-serif';
  ctx.fillText(value, x+pad, y+24);
  ctx.restore();
}

function frame(ts) {
  if (!startTime) startTime = ts;
  t = (ts - startTime) * 0.001;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,W,H);

  // Layout
  const margin = 28;
  const labelW = 110;
  const buildingX = margin + labelW + 12;
  const buildingW = W - buildingX - margin;
  const buildingH = H - 60;
  const buildingY = 30;
  const floorH = buildingH / FLOOR_COUNT;

  // Pipe positions (vertical conduits between floors)
  const pipeXs = [
    buildingX + buildingW * 0.12,
    buildingX + buildingW * 0.32,
    buildingX + buildingW * 0.55,
    buildingX + buildingW * 0.75,
  ];

  // Init scan lines once
  if (scanLines.length === 0) {
    FLOORS.forEach((f, fi) => {
      const fy = buildingY + fi * floorH;
      for (let i=0;i<4;i++) scanLines.push(new ScanLine(fy, floorH, f.accent));
    });
  }
  scanLines.forEach(s => s.update());

  // Spawn packets
  if (Math.random() < 0.18) {
    const px = pipeXs[Math.floor(Math.random()*pipeXs.length)];
    particles.push(new DataPacket(px, buildingY + buildingH));
  }
  particles = particles.filter(p => p.y > buildingY - 20);
  particles.forEach(p => p.update());

  // ── Draw floors ──
  FLOORS.forEach((f, fi) => {
    const fy = buildingY + fi * floorH;
    const floorProgress = clamp((t * 0.6 - fi * 0.18), 0, 1);
    const fp = ease(floorProgress);

    // Floor background
    ctx.save();
    ctx.beginPath();
    ctx.rect(buildingX, fy, buildingW * fp, floorH - 1);
    ctx.fillStyle = f.color;
    ctx.fill();

    // Scan lines (clipped to floor)
    ctx.clip();
    scanLines.filter(s => s.floorY === fy).forEach(s => s.draw(buildingX, buildingW));
    ctx.restore();

    // Floor border
    ctx.beginPath();
    ctx.rect(buildingX, fy, buildingW * fp, floorH - 1);
    ctx.strokeStyle = f.accent;
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.4;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Accent left strip
    ctx.fillStyle = f.accent;
    ctx.globalAlpha = fp * 0.9;
    ctx.fillRect(buildingX, fy, 3, floorH - 1);
    ctx.globalAlpha = 1;

    // Level indicator dots
    for (let d=0; d<=f.level; d++) {
      ctx.beginPath();
      ctx.arc(buildingX + 14 + d*11, fy + floorH/2, 3.5, 0, Math.PI*2);
      ctx.fillStyle = f.accent;
      ctx.globalAlpha = fp * (d === f.level ? 1 : 0.35);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Floor label (left of building)
    ctx.globalAlpha = fp;
    ctx.fillStyle = '#c8f0dc';
    ctx.font = '500 11px DM Sans,sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(f.label, buildingX - 16, fy + floorH/2 - 5);
    ctx.fillStyle = '#4aaa72';
    ctx.font = '400 9px DM Sans,sans-serif';
    ctx.fillText(f.sublabel, buildingX - 16, fy + floorH/2 + 8);
    ctx.globalAlpha = 1;

    // Icon
    const iconX = buildingX + buildingW * 0.88;
    const iconY = fy + floorH/2;
    drawIcon(f.icon, iconX, iconY, 13, f.accent, fp * (0.6 + 0.4*Math.sin(t*1.2 + fi)));

    // Activity bar graph (mini) per floor
    const barCount = 6;
    const barW = 9;
    const barGap = 4;
    const barX = buildingX + 60;
    for (let b=0; b<barCount; b++) {
      const phase = t * (0.4 + fi*0.1) + b*0.8;
      const bh = (0.35 + 0.55 * Math.abs(Math.sin(phase))) * (floorH - 14);
      ctx.fillStyle = f.accent;
      ctx.globalAlpha = fp * (0.3 + 0.5*(fi/FLOOR_COUNT));
      ctx.fillRect(barX + b*(barW+barGap), fy + floorH - 7 - bh, barW, bh);
    }
    ctx.globalAlpha = 1;

    // Pipe slots (vertical)
    pipeXs.forEach(px => {
      ctx.beginPath();
      ctx.rect(px - 2, fy, 4, floorH-1);
      ctx.fillStyle = '#0a1a0f';
      ctx.globalAlpha = 0.7;
      ctx.fill();
      ctx.strokeStyle = GD;
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = 0.4;
      ctx.stroke();
      ctx.globalAlpha = 1;
    });
  });

  // ── Draw packets over everything ──
  particles.forEach(p => p.draw());

  // ── Top KPI row (appears after floors are up) ──
  const kpiAlpha = clamp(t * 0.4 - 0.9, 0, 1);
  if (kpiAlpha > 0) {
    const kpis = [
      { label:'Data Maturity', value:'+2.4 levels' },
      { label:'Report Time',   value:'-68% faster' },
      { label:'Accuracy',      value:'99.1%' },
      { label:'Cost Saved',    value:'$2.3M / yr' },
    ];
    const kpiY = buildingY + buildingH + 8;
    const spacing = buildingW / kpis.length;
    kpis.forEach((k, i) => {
      const kx = buildingX + i * spacing + spacing/2 - 43;
      ctx.globalAlpha = kpiAlpha * ease(clamp(t*0.5 - 1.0 - i*0.12, 0, 1));
      drawKpiTag(kx, kpiY, k.label, k.value, GL);
      ctx.globalAlpha = 1;
    });
  }

  // ── Animated "elevator" cursor climbing floors ──
  const elevProgress = clamp((t * 0.22) % 1.2, 0, 1);
  const elevY = buildingY + buildingH - elevProgress * buildingH;
  const elevX = buildingX + buildingW * 0.96;
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = GL;
  ctx.beginPath();
  ctx.arc(elevX, elevY, 5, 0, Math.PI*2);
  ctx.fill();
  // Trail
  ctx.beginPath();
  ctx.moveTo(elevX, elevY + 5);
  ctx.lineTo(elevX, elevY + 30);
  ctx.strokeStyle = GL;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.25;
  ctx.stroke();
  ctx.restore();

  // ── Title overlay ──
  ctx.globalAlpha = clamp(t * 0.8, 0, 1);
  ctx.fillStyle = '#4aaa72';
  ctx.font = '400 11px DM Sans,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Data Maturity Journey', margin, H - 10);
  ctx.fillStyle = '#2d5a3d';
  ctx.font = '400 10px JetBrains Mono,monospace';
  ctx.textAlign = 'right';
  ctx.fillText('convergentbt.com', W - margin, H - 10);
  ctx.globalAlpha = 1;

  raf = requestAnimationFrame(frame);
}

raf = requestAnimationFrame(frame);
</script>
