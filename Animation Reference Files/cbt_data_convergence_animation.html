
<canvas id="c" style="display:block;width:100%;height:480px;border-radius:12px;background:#0C1A10;cursor:default"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  W = r.width; H = r.height;
  CX = W/2; CY = H/2;
}
let W,H,CX,CY;
resize();
window.addEventListener('resize', () => { resize(); initScene(); });

const GREEN  = '#00994D';
const GLIGHT = '#00C060';
const GDARK  = '#007A3D';
const GMUTED = '#E6F5ED';
const BG     = '#0C1A10';

let phase = 0;        // 0=drift 1=converge 2=crystallise 3=breathe
let phaseT = 0;
let startT = null;
let particles = [];
let nodes = [];
let edges = [];
let packets = [];
let raf;

const PHASE_DURATIONS = [2200, 2400, 1600, Infinity];

// ── Node labels for the final graph ──
const NODE_DEFS = [
  { label:'Data\nStrategy',  dx:-0.38, dy:-0.28 },
  { label:'Cloud\nMigration',dx: 0.38, dy:-0.28 },
  { label:'Analytics',       dx:-0.38, dy: 0.28 },
  { label:'AI\nAdoption',    dx: 0.38, dy: 0.28 },
  { label:'BI &\nReporting', dx: 0.0,  dy:-0.40 },
  { label:'Training',        dx:-0.44, dy: 0.0  },
  { label:'Decision\nSci',   dx: 0.44, dy: 0.0  },
  { label:'AnalyticOps',     dx: 0.0,  dy: 0.40 },
];

const EDGE_PAIRS = [
  [0,4],[0,5],[0,2],
  [1,4],[1,6],[1,3],
  [2,7],[2,5],
  [3,7],[3,6],
  [4,1],[4,0],
  [5,7],[6,7],
  [0,1],[2,3],
];

function rand(a,b){ return a + Math.random()*(b-a); }
function lerp(a,b,t){ return a+(b-a)*t; }
function easeOutCubic(t){ return 1-Math.pow(1-t,3); }
function easeInOutQuad(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

// Simplex-ish noise for drifting
function noise(x,y,t){
  return Math.sin(x*0.8+t*0.7)*Math.cos(y*0.6+t*0.5)*0.5
       + Math.sin(x*1.3+t*0.3)*Math.sin(y*1.1+t*0.4)*0.3;
}

class Particle {
  constructor(){
    this.reset();
    this.alpha = rand(0.3,1);
    this.age   = rand(0, 200);
    this.speed = rand(0.3, 1.1);
    this.size  = rand(1.2, 3.2);
    this.tail  = [];
    this.nodeTarget = null;
    this.converging = false;
    this.convergeX = 0; this.convergeY = 0;
    this.bx1=0; this.by1=0; this.bx2=0; this.by2=0;
    this.convergeProgress = 0;
    this.startX = this.x; this.startY = this.y;
    this.absorbed = false;
    this.color = Math.random() > 0.15 ? GREEN : (Math.random()>0.5 ? GLIGHT : '#ffffff');
  }
  reset(){
    const side = Math.floor(rand(0,4));
    if(side===0){ this.x=rand(0,W); this.y=-10; }
    else if(side===1){ this.x=W+10; this.y=rand(0,H); }
    else if(side===2){ this.x=rand(0,W); this.y=H+10; }
    else { this.x=-10; this.y=rand(0,H); }
    this.vx = rand(-0.4,0.4); this.vy = rand(-0.4,0.4);
  }
  startConverge(tx,ty){
    this.converging = true;
    this.startX = this.x; this.startY = this.y;
    this.convergeX = tx; this.convergeY = ty;
    this.convergeProgress = 0;
    const mx = lerp(this.x, tx, 0.5) + rand(-80,80);
    const my = lerp(this.y, ty, 0.5) + rand(-80,80);
    this.bx1 = mx+rand(-40,40); this.by1 = my+rand(-40,40);
    this.bx2 = lerp(mx,tx,0.6)+rand(-20,20); this.by2 = lerp(my,ty,0.6)+rand(-20,20);
    this.speed = rand(0.006,0.018);
  }
  update(dt, t){
    if(this.absorbed) return;
    this.age += dt;
    this.tail.push({x:this.x, y:this.y});
    if(this.tail.length > 8) this.tail.shift();

    if(this.converging){
      this.convergeProgress = Math.min(1, this.convergeProgress + this.speed * dt * 0.06);
      const p = easeInOutQuad(this.convergeProgress);
      // Cubic Bézier
      const q = 1-p;
      this.x = q*q*q*this.startX + 3*q*q*p*this.bx1 + 3*q*p*p*this.bx2 + p*p*p*this.convergeX;
      this.y = q*q*q*this.startY + 3*q*q*p*this.by1 + 3*q*p*p*this.by2 + p*p*p*this.convergeY;
      if(this.convergeProgress >= 0.98){ this.absorbed = true; }
    } else {
      const n = noise(this.x*0.006, this.y*0.006, t*0.0003);
      const angle = n * Math.PI * 4;
      this.vx += Math.cos(angle)*0.05;
      this.vy += Math.sin(angle)*0.05;
      this.vx *= 0.97; this.vy *= 0.97;
      this.x += this.vx * this.speed;
      this.y += this.vy * this.speed;
    }
  }
  draw(){
    if(this.absorbed) return;
    if(this.tail.length > 1){
      ctx.beginPath();
      ctx.moveTo(this.tail[0].x, this.tail[0].y);
      for(let i=1;i<this.tail.length;i++) ctx.lineTo(this.tail[i].x, this.tail[i].y);
      ctx.strokeStyle = this.color;
      ctx.globalAlpha = 0.18 * this.alpha;
      ctx.lineWidth = this.size * 0.5;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha * (this.converging ? (1-this.convergeProgress*0.7) : 0.85);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class NetNode {
  constructor(id, def){
    this.id = id;
    this.tx = CX + def.dx * Math.min(W,H) * 0.75;
    this.ty = CY + def.dy * Math.min(W,H) * 0.75;
    this.x = CX; this.y = CY;
    this.label = def.label;
    this.r = id===4||id===0 ? 11 : 8;
    this.alpha = 0;
    this.pulse = 0;
    this.pulseSpeed = rand(0.8,1.4);
    this.spawnT = rand(0, 800);
  }
  update(t, crystalProgress){
    if(crystalProgress <= 0) return;
    const delay = this.spawnT;
    const p = Math.max(0, Math.min(1, (crystalProgress*1600 - delay)/600));
    this.alpha = easeOutCubic(p);
    this.x = lerp(CX, this.tx, easeOutCubic(p));
    this.y = lerp(CY, this.ty, easeOutCubic(p));
    this.pulse = 0.3 + 0.7 * Math.abs(Math.sin(t * 0.001 * this.pulseSpeed + this.id));
  }
  draw(){
    if(this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;

    // Glow ring
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r + 6 * this.pulse, 0, Math.PI*2);
    ctx.strokeStyle = GREEN;
    ctx.lineWidth = 1;
    ctx.globalAlpha = this.alpha * 0.25 * this.pulse;
    ctx.stroke();

    // Node fill
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = GDARK;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    ctx.strokeStyle = GLIGHT;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
    ctx.fillStyle = GLIGHT;
    ctx.globalAlpha = this.alpha * this.pulse;
    ctx.fill();

    // Label
    const lines = this.label.split('\n');
    ctx.fillStyle = '#c8f0dc';
    ctx.font = `500 10px DM Sans, sans-serif`;
    ctx.textAlign = 'center';
    ctx.globalAlpha = this.alpha * 0.9;
    const offY = this.r + 14;
    lines.forEach((ln,i) => {
      ctx.fillText(ln, this.x, this.y + offY + i*13);
    });

    ctx.restore();
  }
}

class Edge {
  constructor(a, b){
    this.a = a; this.b = b;
    this.progress = 0;
    this.alpha = 0;
    this.delay = rand(0, 1000);
  }
  update(crystalProgress){
    const p = Math.max(0, Math.min(1, (crystalProgress*1600 - this.delay)/500));
    this.progress = easeOutCubic(p);
    this.alpha = this.progress;
  }
  draw(){
    if(this.alpha<=0) return;
    const A = nodes[this.a], B = nodes[this.b];
    if(!A||!B||A.alpha<=0||B.alpha<=0) return;
    const ex = lerp(A.x, B.x, this.progress);
    const ey = lerp(A.y, B.y, this.progress);
    ctx.beginPath();
    ctx.moveTo(A.x, A.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = GREEN;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.35 * this.alpha * Math.min(A.alpha, B.alpha);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

class Packet {
  constructor(){
    this.reset();
  }
  reset(){
    const e = edges[Math.floor(Math.random()*edges.length)];
    if(!e){ this.done=true; return; }
    const flip = Math.random()>0.5;
    this.srcI = flip ? e.b : e.a;
    this.dstI = flip ? e.a : e.b;
    this.t = 0;
    this.speed = rand(0.003, 0.008);
    this.done = false;
    this.size = rand(2.5,4.5);
  }
  update(){
    this.t += this.speed;
    if(this.t >= 1) this.done = true;
  }
  draw(){
    if(this.done) return;
    const A = nodes[this.srcI], B = nodes[this.dstI];
    if(!A||!B||A.alpha<0.5||B.alpha<0.5) return;
    const p = easeInOutQuad(this.t);
    const x = lerp(A.x, B.x, p);
    const y = lerp(A.y, B.y, p);
    ctx.beginPath();
    ctx.arc(x, y, this.size, 0, Math.PI*2);
    ctx.fillStyle = GLIGHT;
    ctx.globalAlpha = 0.9 * (1 - Math.abs(p-0.5)*1.5);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── Central CBT node ──
let hubAlpha = 0;
let hubPulse = 0;

function initScene(){
  particles = [];
  nodes = [];
  edges = [];
  packets = [];
  phase = 0; phaseT = 0; startT = null;
  hubAlpha = 0;

  for(let i=0;i<110;i++) particles.push(new Particle());
  NODE_DEFS.forEach((d,i) => nodes.push(new NetNode(i,d)));
  EDGE_PAIRS.forEach(([a,b]) => edges.push(new Edge(a,b)));
}

function spawnPackets(){
  while(packets.length < 18){
    const pk = new Packet();
    pk.t = Math.random();
    packets.push(pk);
  }
}

function draw(ts){
  if(!startT) startT = ts;
  const elapsed = ts - startT;

  // Phase transitions
  if(phase < 3){
    phaseT = elapsed - PHASE_DURATIONS.slice(0,phase).reduce((a,b)=>a+b,0);
    const phaseProgress = phaseT / PHASE_DURATIONS[phase];
    if(phaseProgress >= 1){ phase++; }
  }

  const totalInPhase = (ph) => PHASE_DURATIONS.slice(0,ph).reduce((a,b)=>a+b,0);
  const p1 = Math.max(0, Math.min(1, (elapsed - totalInPhase(0)) / PHASE_DURATIONS[1]));
  const p2 = Math.max(0, Math.min(1, (elapsed - totalInPhase(1)) / PHASE_DURATIONS[2]));

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,W,H);

  // ── Grid shimmer (phase 0 only) ──
  if(phase <= 1){
    const gridAlpha = Math.max(0, 1 - p1*2);
    ctx.strokeStyle = '#1a3322';
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = gridAlpha * 0.6;
    const step = 40;
    for(let x=0;x<W;x+=step){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for(let y=0;y<H;y+=step){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // ── Trigger convergence ──
  if(phase >= 1 && p1 > 0){
    particles.forEach((p,i) => {
      if(!p.converging && !p.absorbed){
        const delay = (i/particles.length) * 0.6;
        if(p1 > delay){
          // Assign to nearest node or center
          const targetNode = nodes[i % nodes.length];
          const tx = p1 > 0.7 ? targetNode.tx : CX + rand(-20,20);
          const ty = p1 > 0.7 ? targetNode.ty : CY + rand(-20,20);
          p.startConverge(tx, ty);
        }
      }
    });
  }

  // Spawn new drifters in phase 3
  if(phase === 3){
    spawnPackets();
    if(Math.random() < 0.015){
      const np = new Particle();
      np.startConverge(nodes[Math.floor(Math.random()*nodes.length)].tx,
                       nodes[Math.floor(Math.random()*nodes.length)].ty);
      particles.push(np);
    }
  }

  // ── Draw edges ──
  edges.forEach(e => { e.update(p2); e.draw(); });

  // ── Particles ──
  particles.forEach(p => {
    p.update(16, ts);
    p.draw();
  });

  // ── Hub node ──
  hubAlpha = Math.min(1, p1 * 3);
  hubPulse = 0.5 + 0.5*Math.abs(Math.sin(ts*0.0015));
  if(hubAlpha > 0){
    // Outer glow
    ctx.beginPath();
    ctx.arc(CX, CY, 28 + 8*hubPulse, 0, Math.PI*2);
    ctx.strokeStyle = GREEN;
    ctx.lineWidth = 1;
    ctx.globalAlpha = hubAlpha * 0.15 * hubPulse;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(CX, CY, 20 + 4*hubPulse, 0, Math.PI*2);
    ctx.strokeStyle = GREEN;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = hubAlpha * 0.35 * hubPulse;
    ctx.stroke();
    // Fill
    ctx.beginPath();
    ctx.arc(CX, CY, 18, 0, Math.PI*2);
    ctx.fillStyle = GDARK;
    ctx.globalAlpha = hubAlpha;
    ctx.fill();
    ctx.strokeStyle = GLIGHT;
    ctx.lineWidth = 2;
    ctx.stroke();
    // CBT text
    ctx.fillStyle = '#c8f0dc';
    ctx.font = `600 11px DM Sans, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = hubAlpha;
    ctx.fillText('CBT', CX, CY);
    ctx.globalAlpha = 1;
    ctx.textBaseline = 'alphabetic';
  }

  // ── Network nodes ──
  nodes.forEach(n => { n.update(ts, p2); n.draw(); });

  // ── Data packets ──
  if(phase === 3){
    packets = packets.filter(pk => !pk.done);
    packets.forEach(pk => { pk.update(); pk.draw(); });
  }

  // ── Phase label overlay ──
  const labels = ['Raw data', 'Converging…', 'Structuring…', 'Live Intelligence'];
  const lIdx = Math.min(phase, 3);
  ctx.fillStyle = '#4aaa72';
  ctx.font = `400 12px DM Sans, sans-serif`;
  ctx.textAlign = 'left';
  ctx.globalAlpha = 0.7;
  ctx.fillText(labels[lIdx], 16, H-14);

  // ── Particle count ──
  const active = particles.filter(p=>!p.absorbed).length;
  ctx.fillStyle = '#2d6644';
  ctx.font = `400 11px JetBrains Mono, monospace`;
  ctx.textAlign = 'right';
  ctx.globalAlpha = 0.5;
  ctx.fillText(`${active} streams`, W-14, H-14);
  ctx.globalAlpha = 1;

  raf = requestAnimationFrame(draw);
}

initScene();
raf = requestAnimationFrame(draw);
</script>
